# gbp-post — weekly GBP post queue status for Samantha
# Schedule: Tuesday 10 AM Pacific (17:00 UTC)
# Pattern: dry-run fixture by default; live when GBP_POST_LIVE=true
name: gbp-post

on:
  schedule:
    - cron: '0 17 * * 2'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Use bundled fixture instead of live Sheets'
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      date:
        description: 'Override run date (YYYY-MM-DD). Empty = Pacific today.'
        default: ''
        type: string

jobs:
  gbp-post-status:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: scripts/gbp-post/package-lock.json

      - name: Install dependencies
        working-directory: scripts/gbp-post
        run: npm ci

      - name: Unit tests
        working-directory: scripts/gbp-post
        run: npm test

      - name: Resolve run date
        id: date
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            echo "value=${{ inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(TZ=America/Los_Angeles date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Run gbp-post (fixture / dry run)
        if: secrets.GBP_POST_LIVE != 'true' || inputs.dry_run == 'true'
        working-directory: scripts/gbp-post
        run: |
          node run.js \
            --fixtures fixtures/sample-week.json \
            --date ${{ steps.date.outputs.value }} \
            --pretty \
            --out "../../artifacts/SAMANTHA_STATUS_gbp-post_${{ steps.date.outputs.value }}.json"

      - name: Run gbp-post (live)
        if: secrets.GBP_POST_LIVE == 'true' && (github.event_name == 'schedule' || inputs.dry_run == 'false')
        working-directory: scripts/gbp-post
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GBP_POST_SPREADSHEET_ID: ${{ secrets.GBP_POST_SPREADSHEET_ID }}
          GBP_POST_TAB: ${{ secrets.GBP_POST_TAB }}
        run: |
          node run.js \
            --date ${{ steps.date.outputs.value }} \
            --pretty \
            --out "../../artifacts/SAMANTHA_STATUS_gbp-post_${{ steps.date.outputs.value }}.json"

      - name: Upload SAMANTHA_STATUS artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SAMANTHA_STATUS_gbp-post_${{ steps.date.outputs.value }}
          path: artifacts/SAMANTHA_STATUS_gbp-post_${{ steps.date.outputs.value }}.json
          if-no-files-found: warn
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          FILE="artifacts/SAMANTHA_STATUS_gbp-post_${{ steps.date.outputs.value }}.json"
          if [ -f "$FILE" ]; then
            echo '### Samantha GBP post status' >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat "$FILE" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
