# attention-hq — daily ops scorecard for Samantha
# Schedule: 5:00 PM Pacific (00:00 UTC next day) — end-of-day report
# Pattern matches email-ops-daily.yml: dry-run by default, live only when
# ATTENTION_HQ_LIVE=true secret is set.
name: attention-hq

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Use bundled fixture instead of live Sheets'
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      date:
        description: 'Override "today" (YYYY-MM-DD). Empty = America/Los_Angeles today.'
        default: ''
        type: string

jobs:
  attention-hq:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ATTENTION_HQ_LIVE: ${{ secrets.ATTENTION_HQ_LIVE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: scripts/attention-hq/package-lock.json

      - name: Install dependencies
        working-directory: scripts/attention-hq
        run: npm ci

      - name: Unit tests
        working-directory: scripts/attention-hq
        run: npm test

      - name: Run attention-hq (fixture / dry run)
        if: env.ATTENTION_HQ_LIVE != 'true' || inputs.dry_run == 'true'
        working-directory: scripts/attention-hq
        run: |
          DATE_ARG=""
          if [ -n "${{ inputs.date }}" ]; then DATE_ARG="--date ${{ inputs.date }}"; fi
          node run.js --fixtures fixtures/sample-day.json $DATE_ARG --pretty --out ../../artifacts/attention-hq.json

      - name: Run attention-hq (live)
        if: env.ATTENTION_HQ_LIVE == 'true' && (github.event_name == 'schedule' || inputs.dry_run == 'false')
        working-directory: scripts/attention-hq
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ATTENTION_HQ_SPREADSHEET_ID: ${{ secrets.ATTENTION_HQ_SPREADSHEET_ID }}
          ATTENTION_HQ_JOBS_TAB: ${{ secrets.ATTENTION_HQ_JOBS_TAB }}
          ATTENTION_HQ_INVOICES_TAB: ${{ secrets.ATTENTION_HQ_INVOICES_TAB }}
        run: |
          DATE_ARG=""
          if [ -n "${{ inputs.date }}" ]; then DATE_ARG="--date ${{ inputs.date }}"; fi
          node run.js $DATE_ARG --pretty --out ../../artifacts/attention-hq.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: attention-hq-report
          path: artifacts/attention-hq.json
          if-no-files-found: warn
          retention-days: 30
