# Daily DNS + secrets preflight — 7:00 AM Pacific
name: Email Preflight

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: DNS preflight
        working-directory: scripts/email-deploy
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          REMINDER_FROM_EMAIL: ${{ secrets.REMINDER_FROM_EMAIL }}
          APPS_SCRIPT_WEBAPP_URL: ${{ secrets.APPS_SCRIPT_WEBAPP_URL }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: node preflight.js
        continue-on-error: true
